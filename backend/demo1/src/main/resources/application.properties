server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/aaljt?useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis XML mapper
mybatis.mapper-locations=classpath*:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
spring.redis.host=localhost
spring.redis.port=6379
deepseek.api.key=REMOVED_DEEPSEEK_KEY

# OpenAI Embedding API 配置（用于知识库向量化）
openai.embedding.key=${OPENAI_API_KEY}
openai.embedding.url=https://api.openai.com/v1/embeddings
openai.embedding.model=text-embedding-3-small
openai.embedding.dimension=1536

# RabbitMQ connection (exposed via localhost:5672)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true

#minio


# search es / opensearch
search.es.enabled=true
search.es.initialize-on-startup=false
search.es.base-url=http://localhost:9200
search.es.username=
search.es.password=
search.es.versioned-index=product_search_v1
search.es.read-alias=product_search_read
search.es.write-alias=product_search_write
search.es.connect-timeout-ms=3000
search.es.read-timeout-ms=5000
search.es.sync-batch-size=500
search.es.mapping-resource=classpath:search/product_search_v1_mapping.json

agent.runtime.total-timeout-ms=8000
agent.runtime.parse-intent-timeout-ms=800
agent.runtime.normalize-params-timeout-ms=400
agent.runtime.route-tools-timeout-ms=400
agent.runtime.execute-timeout-ms=1600
agent.runtime.compose-response-timeout-ms=600

agent.router.max-parallel-tools=2
agent.router.max-realtime-candidates=10
agent.router.allow-partial-answer=true
agent.router.clarify-on-missing-required-slots=true
agent.router.knowledge-optional-for-search=true
agent.router.clarify-on-low-intent-confidence=true
agent.router.low-intent-confidence-threshold=0.45
agent.router.structured-search-timeout-ms=1200
agent.router.knowledge-timeout-ms=800
agent.router.realtime-timeout-ms=900
agent.router.prefer-snapshot-when-realtime-timeout-ms=1200

agent.tool-registry.knowledge-retrieval-enabled=true
agent.tool-registry.product-structured-search-enabled=true
agent.tool-registry.event-structured-search-enabled=false
agent.tool-registry.store-structured-search-enabled=false
agent.tool-registry.product-realtime-enabled=true
agent.tool-registry.event-realtime-enabled=false
agent.tool-registry.store-realtime-enabled=false
agent.tool-registry.backend-api-proxy-enabled=true

agent.backend-tool.enabled=true
agent.backend-tool.auto-read-routes-enabled=true
agent.backend-tool.auto-unsafe-operations-enabled=false
agent.backend-tool.require-authorization-for-user-scoped-routes=true
agent.backend-tool.min-match-score=0.62
agent.backend-tool.timeout-ms=1500

agent.router.python.enabled=true
agent.router.python.base-url=http://127.0.0.1:9001
agent.router.python.route-path=/route_tools
agent.router.python.connect-timeout-ms=200
agent.router.python.read-timeout-ms=650

agent.composer.python.enabled=true
agent.composer.python.base-url=http://127.0.0.1:9001
agent.composer.python.compose-path=/compose_response
agent.composer.python.connect-timeout-ms=200
agent.composer.python.read-timeout-ms=900

query.parser.python.enabled=true
query.parser.python.base-url=http://127.0.0.1:9001
query.parser.python.parse-path=/parse_intent
query.parser.python.connect-timeout-ms=200
query.parser.python.read-timeout-ms=650

agent.realtime.enabled=true
agent.realtime.max-candidates=5
agent.realtime.simulated-latency-ms=20
agent.realtime.fallback-source=snapshot_fallback
agent.realtime.default-currency=CNY
agent.realtime.gateway-enabled=false
agent.realtime.gateway-base-url=http://127.0.0.1:9010
agent.realtime.gateway-query-path=/query
agent.realtime.gateway-connect-timeout-ms=200
agent.realtime.gateway-read-timeout-ms=450
agent.realtime.cache-ttl-seconds=15
